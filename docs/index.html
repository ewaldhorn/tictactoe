<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A modern, responsive Tic Tac Toe game with AI opponent. Play against the computer in your browser.">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.min.css">
</head>
<body>
  <main>
    <canvas id="canvas" aria-label="Tic Tac Toe game board" role="application">
    <p>Please enable JavaScript to play.</p>
  </canvas>
  <div id="game-status" aria-live="polite" class="sr-only"></div>
  </main>
  <script src="index.min.js" defer></script>
  <footer class="site-footer">
    <a href="https://nofuss.co.za/toys/" target="_blank" rel="noopener noreferrer">More Toys</a>
  </footer>
</body>
</html>
